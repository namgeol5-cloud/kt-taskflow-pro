<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow Pro</title>

  <!-- FOUC 방지: 렌더링 전 테마 클래스 설정 -->
  <script>
    (function () {
      var s = localStorage.getItem('theme');
      if (s === 'dark' || (!s && matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
  </script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="min-h-screen bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-200">

  <!-- Tailwind 동적 클래스 safelist (JS에서 생성되는 클래스 보장) -->
  <div class="hidden
    bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300
    bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300
    bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-300
    text-red-500 text-gray-400 dark:text-gray-500
    bg-gray-400 dark:bg-gray-500 bg-blue-500 bg-green-500
    hover:bg-gray-200 dark:hover:bg-gray-600 line-clamp-2">
  </div>

  <!-- 헤더 -->
  <header class="sticky top-0 z-10 backdrop-blur-md bg-white/70 dark:bg-gray-800/70 border-b border-gray-200 dark:border-gray-700 px-4 py-3">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <h1 class="text-lg font-semibold tracking-tight">TaskFlow Pro</h1>
      <button id="theme-toggle"
        class="min-h-[44px] min-w-[44px] flex items-center justify-center rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors text-xl"
        aria-label="테마 전환">
        <span id="theme-icon"></span>
      </button>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-6 space-y-6">

    <!-- 추가 폼 -->
    <section class="bg-white/70 dark:bg-gray-800/70 backdrop-blur-md rounded-xl shadow-lg p-4 space-y-3">
      <h2 class="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider">새 업무 추가</h2>
      <form id="add-form" class="space-y-3" novalidate>
        <input id="form-title" type="text" placeholder="업무 제목 (필수)"
          class="w-full rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700/50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition" />
        <textarea id="form-description" placeholder="설명 (선택)" rows="2"
          class="w-full rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700/50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition resize-none"></textarea>
        <div class="flex flex-col sm:flex-row gap-2">
          <input id="form-due-at" type="datetime-local"
            class="flex-1 min-w-0 rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700/50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition" />
          <select id="form-status"
            class="rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700/50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition">
            <option value="todo">할일</option>
            <option value="in_progress">진행중</option>
            <option value="done">완료</option>
          </select>
        </div>
        <p id="add-error" class="hidden text-xs text-red-500"></p>
        <button type="submit"
          class="w-full min-h-[44px] rounded-xl bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white text-sm font-medium transition-colors">
          + 추가
        </button>
      </form>
    </section>

    <!-- 업무 목록 -->
    <section>
      <div id="task-list" class="space-y-3"></div>
      <p id="empty-msg" class="hidden text-center text-sm text-gray-400 dark:text-gray-500 py-10">
        업무가 없습니다. 새 업무를 추가해보세요.
      </p>
    </section>

  </main>

  <!-- 수정 모달 -->
  <div id="edit-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div id="modal-backdrop" class="absolute inset-0 bg-black/30 backdrop-blur-sm"></div>
    <div class="relative w-full max-w-md bg-white dark:bg-gray-800 rounded-xl shadow-xl p-6 space-y-4">
      <h2 class="text-base font-semibold">업무 수정</h2>
      <form id="edit-form" class="space-y-3" novalidate>
        <input type="hidden" id="edit-id" />
        <input id="edit-title" type="text" placeholder="업무 제목 (필수)"
          class="w-full rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700/50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition" />
        <textarea id="edit-description" placeholder="설명 (선택)" rows="3"
          class="w-full rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700/50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition resize-none"></textarea>
        <div class="flex flex-col sm:flex-row gap-2">
          <input id="edit-due-at" type="datetime-local"
            class="flex-1 min-w-0 rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700/50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition" />
          <select id="edit-status"
            class="rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700/50 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition">
            <option value="todo">할일</option>
            <option value="in_progress">진행중</option>
            <option value="done">완료</option>
          </select>
        </div>
        <p id="edit-error" class="hidden text-xs text-red-500"></p>
        <div class="flex gap-2 pt-1">
          <button type="button" id="edit-cancel"
            class="flex-1 min-h-[44px] rounded-xl border border-gray-200 dark:border-gray-600 text-sm hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
            취소
          </button>
          <button type="submit"
            class="flex-1 min-h-[44px] rounded-xl bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white text-sm font-medium transition-colors">
            저장
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- 삭제 확인 다이얼로그 -->
  <div id="confirm-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/30 backdrop-blur-sm"></div>
    <div class="relative bg-white dark:bg-gray-800 rounded-xl shadow-xl p-6 w-full max-w-xs space-y-5 text-center">
      <p class="text-sm font-medium">정말 삭제할까요?</p>
      <div class="flex gap-2">
        <button id="confirm-cancel"
          class="flex-1 min-h-[44px] rounded-xl border border-gray-200 dark:border-gray-600 text-sm hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
          아니오
        </button>
        <button id="confirm-ok"
          class="flex-1 min-h-[44px] rounded-xl bg-red-500 hover:bg-red-600 active:bg-red-700 text-white text-sm font-medium transition-colors">
          삭제
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
